{{- /*
Static app-plane registry (MVP). Each `apps:` entry is a long-running internal
HTTP service reachable only through the api-rs /apps/{name}/* proxy: the
NetworkPolicy admits ingress solely from api-rs, so the proxy's
credential-stripping and identity-header injection cannot be bypassed
in-cluster. A DB-backed registry later replaces the values block without
changing the workload shape rendered here.
*/ -}}
{{- range $app := .Values.apps }}
{{- $component := printf "app-%s" (required "apps[].name is required" $app.name) }}
{{- $appName := include "centaur.componentName" (dict "root" $ "component" $component) }}
{{- $appPort := int ($app.port | default 8080) }}
{{- $persistence := $app.persistence | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  labels:
{{ include "centaur.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
spec:
  replicas: 1
{{- if $persistence.enabled }}
  # The data volume is ReadWriteOnce; Recreate keeps the old and new pod from
  # contending for the claim during a rollout.
  strategy:
    type: Recreate
{{- end }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 8 }}
    spec:
{{- with $app.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      automountServiceAccountToken: false
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ required (printf "apps[%s].image is required" $app.name) $app.image | quote }}
          imagePullPolicy: {{ $app.imagePullPolicy | default "Always" }}
          env:
            - name: PORT
              value: {{ $appPort | quote }}
{{- with $app.env }}
{{ toYaml . | nindent 12 }}
{{- end }}
          ports:
            - containerPort: {{ $appPort }}
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
{{ toYaml ($app.resources | default dict) | nindent 12 }}
{{- if $persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $appName | quote }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  labels:
{{ include "centaur.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
spec:
  selector:
{{ include "centaur.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ $appPort }}
---
{{- if $persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $appName }}
  labels:
{{ include "centaur.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
{{- with $persistence.storageClass }}
  storageClassName: {{ . | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ $persistence.size | default "5Gi" | quote }}
---
{{- end }}
{{- if $.Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $appName }}
  labels:
{{ include "centaur.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the api-rs proxy may reach the app: it strips caller credentials
    # and injects the app identity header before forwarding.
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" $ "component" "api-rs") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $appPort }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- with $app.egress }}
    # Operator-declared extra egress (e.g. the object-storage endpoint the
    # app syncs from), appended verbatim.
{{ toYaml . | nindent 4 }}
{{- end }}
---
{{- end }}
{{- end }}
