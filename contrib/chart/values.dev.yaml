secretManager:
  backend: onepassword
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key

postgres:
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD

slackbotv2:
  image:
    pullPolicy: IfNotPresent

discordbot:
  # Enable once DISCORD_* secrets + a guild allowlist are configured.
  enabled: false
  image:
    pullPolicy: IfNotPresent

teamsbot:
  # Enable once TEAMS_* app secrets and Bot Framework routing are configured.
  enabled: false
  image:
    pullPolicy: IfNotPresent

apiRs:
  image:
    pullPolicy: IfNotPresent

console:
  enabled: true
  image:
    pullPolicy: IfNotPresent

ironProxy:
  image:
    pullPolicy: IfNotPresent
  manager:
    secretSource: onepassword

sandbox:
  image:
    pullPolicy: IfNotPresent

# Run the tool-server sidecar by default in dev so local clusters mirror
# production sandbox topology.
toolServer:
  enabled: true

