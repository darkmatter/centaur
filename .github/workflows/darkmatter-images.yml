name: darkmatter images

# Build + push every darkmatter Centaur image that GitOps pins by product SHA
# (api-rs, agent, console, slackbotv2, collab-relay). Never build these
# locally — deployed tags must match committed source. Darkmatter fork only.
# (publish-images.yml is upstream-oriented and skips owner=darkmatter.)
on:
  push:
    branches: [main]
    paths:
      - "services/api-rs/**"
      - "services/sandbox/**"
      - "services/workflow-python/**"
      - "crates/**"
      - "harness/**"
      - "tools/**"
      - "workflows/**"
      - "services/console/**"
      - "services/collab-relay/**"
      - "services/slackbotv2/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/darkmatter-images.yml"
  workflow_dispatch: {}

concurrency:
  group: darkmatter-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  api-rs:
    if: github.repository_owner == 'darkmatter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/centaur-api-rs
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api-rs/Dockerfile
          platforms: linux/amd64 # k3s nodes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-rs
          cache-to: type=gha,mode=max,scope=api-rs

  agent:
    if: github.repository_owner == 'darkmatter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/centaur-agent
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/sandbox/Dockerfile
          target: sandbox
          platforms: linux/amd64 # k3s nodes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  console:
    if: github.repository_owner == 'darkmatter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/centaur-console
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: services/console
          file: services/console/Dockerfile
          platforms: linux/amd64 # k3s nodes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console

  slackbotv2:
    if: github.repository_owner == 'darkmatter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/centaur-slackbotv2
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          # Workspace root: Dockerfile copies packages/, pnpm workspace, harness.
          context: .
          file: services/slackbotv2/Dockerfile
          platforms: linux/amd64 # k3s nodes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slackbotv2
          cache-to: type=gha,mode=max,scope=slackbotv2

  collab-relay:
    if: github.repository_owner == 'darkmatter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/centaur-collab-relay
          tags: |
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: services/collab-relay
          file: services/collab-relay/Dockerfile
          platforms: linux/amd64 # k3s nodes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=collab-relay
          cache-to: type=gha,mode=max,scope=collab-relay
